<article class="memo-card" id="memo-{{ m.id }}">
  <div class="memo-meta">
    {% if m.pinned %}<span class="pin">📌</span>{% endif %}
    <time datetime="{{ m.created_iso }}">{{ m.created_display }}</time>
    <span>·</span>
    <span>@{{ m.username }}</span>
    {% if m.visibility != "private" %}<span class="vis">{{ m.visibility }}</span>{% endif %}
    <span class="spacer"></span>
    {% if m.can_edit %}
    <div class="memo-actions">
      {% if !m.archived %}
      <button class="btn-ghost" hx-get="/memos/{{ m.id }}/edit"
              hx-target="closest .memo-card" hx-swap="outerHTML">Edit</button>
      <button class="btn-ghost" hx-post="/memos/{{ m.id }}/pin"
              hx-target="closest .memo-card" hx-swap="outerHTML">
        {% if m.pinned %}Unpin{% else %}Pin{% endif %}
      </button>
      <button class="btn-ghost" data-copy="/m/{{ m.uid }}">Link</button>
      <button class="btn-ghost" hx-post="/memos/{{ m.id }}/archive"
              hx-target="closest .memo-card" hx-swap="outerHTML">Archive</button>
      {% else %}
      <button class="btn-ghost" hx-post="/memos/{{ m.id }}/archive"
              hx-target="closest .memo-card" hx-swap="outerHTML">Restore</button>
      {% endif %}
      <button class="btn-ghost btn-danger" hx-delete="/memos/{{ m.id }}"
              hx-confirm="Delete this memo permanently?"
              hx-target="closest .memo-card" hx-swap="outerHTML">Delete</button>
    </div>
    {% else %}
    <a class="btn-ghost" href="/m/{{ m.uid }}">Open</a>
    {% endif %}
  </div>
  <div class="memo-content">{{ m.html|safe }}</div>
</article>
